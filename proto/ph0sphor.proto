// PHOSPHOR wire protocol — Milestone 1 schema.
//
// Production transport: Protobuf binary frames over WebSocket.
// Debug transport: JSON mirror of the same logical schema (development only).
//
// Versioning rule: every Envelope carries a protocol_version. Breaking
// changes increment the major version. Backward-compatible additions
// preserve old field numbers. Unknown fields are ignored where safe.

syntax = "proto3";

package ph0sphor.v1;

// ============================================================================
// Envelope
// ============================================================================

// All wire traffic is an Envelope. Endpoints inspect protocol_version and
// then dispatch on the oneof payload.
message Envelope {
  uint32 protocol_version = 1;

  oneof payload {
    Hello              hello              = 10;
    AuthRequest        auth_request       = 11;
    AuthResponse       auth_response      = 12;
    PairingRequest     pairing_request    = 13;
    PairingChallenge   pairing_challenge  = 14;
    PairingConfirm     pairing_confirm    = 15;

    FullSnapshot       full_snapshot      = 20;
    DeltaUpdate        delta_update       = 21;
    Event              event              = 22;

    Ping               ping               = 30;
    Pong               pong               = 31;
    ErrorMessage       error              = 40;
  }
}

// ============================================================================
// Handshake and pairing
// ============================================================================

message Hello {
  string client_id = 1;
  string client_version = 2;
}

message AuthRequest {
  string token = 1;
}

message AuthResponse {
  bool ok = 1;
  string reason = 2;
}

message PairingRequest {
  string client_id = 1;
}

message PairingChallenge {
  string code = 1;
}

message PairingConfirm {
  string code = 1;
}

// ============================================================================
// Telemetry
// ============================================================================

message FullSnapshot {
  uint64 timestamp_unix_ms = 1;
  string hostname = 2;
  string os = 3;
  uint64 uptime_secs = 4;

  CpuMetrics cpu = 5;
  MemoryMetrics memory = 6;
  repeated DiskMetrics disks = 7;
  repeated NetworkMetrics network = 8;
}

// DeltaUpdate carries only fields that changed since the last snapshot or
// delta sent to this client. Absent fields mean "unchanged". Numeric
// optional-equivalents use explicit presence (optional keyword) so a
// missing value is distinguishable from zero.
message DeltaUpdate {
  uint64 timestamp_unix_ms = 1;

  optional float  cpu_usage_percent = 10;
  optional float  cpu_temperature_c = 11;

  optional uint64 memory_used_bytes  = 20;
  optional uint64 memory_total_bytes = 21;

  // Repeated fields replace the previous value entirely when present.
  repeated DiskMetrics disks = 30;
  repeated NetworkMetrics network = 31;
}

message CpuMetrics {
  float  usage_percent = 1;
  optional float  temperature_c = 2;
  optional uint32 core_count = 3;
}

message MemoryMetrics {
  uint64 used_bytes = 1;
  uint64 total_bytes = 2;
  optional uint64 swap_used_bytes = 3;
  optional uint64 swap_total_bytes = 4;
}

message DiskMetrics {
  string mount = 1;
  uint64 used_bytes = 2;
  uint64 total_bytes = 3;
  optional float temperature_c = 4;
}

message NetworkMetrics {
  string iface = 1;
  uint64 rx_bytes_per_sec = 2;
  uint64 tx_bytes_per_sec = 3;
  optional uint64 rx_total_bytes = 4;
  optional uint64 tx_total_bytes = 5;
}

// ============================================================================
// Events
// ============================================================================

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO        = 1;
  SEVERITY_WARN        = 2;
  SEVERITY_CRITICAL    = 3;
}

message Event {
  uint64 timestamp_unix_ms = 1;
  Severity severity = 2;
  // Stable, lowercase kind identifier. Examples:
  //   new_mail, threshold_crossed, collector_failed, collector_recovered,
  //   client_reconnected, timer_completed, alarm_triggered, custom
  string kind = 3;
  // Human-readable message, secrets already redacted by the server.
  string message = 4;
  // Free-form, small attribute map; values are short strings only.
  map<string, string> attributes = 5;
}

// ============================================================================
// Liveness and errors
// ============================================================================

message Ping {
  uint64 nonce = 1;
}

message Pong {
  uint64 nonce = 1;
}

message ErrorMessage {
  string code = 1;
  string message = 2;
}
